# AccelMark Model Path Configuration
#
# For each model, you can specify a local_path to use instead of
# downloading from HuggingFace. If local_path is not set or the
# path does not exist, the HuggingFace model_id is used.
#
# Usage: run_vllm.py will automatically use local_path if available.
# You can also override with --model-path on the command line.

models:
  meta-llama/Meta-Llama-3-8B-Instruct:
    local_path: null   # set to e.g. /user/models/Meta-Llama-3-8B

  meta-llama/Meta-Llama-3-70B-Instruct:
    local_path: null

  meta-llama/Llama-3.1-8B-Instruct:
    local_path: null

  meta-llama/Meta-Llama-3-8B:
    local_path: null
