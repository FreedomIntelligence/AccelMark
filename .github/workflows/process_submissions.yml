name: Process Community Submission

# Triggered when an issue is labeled "community-submission"
# (The OpenClaw Skill creates issues with this label)
on:
  issues:
    types: [labeled]

jobs:
  process:
    name: Extract and validate submission from issue
    # Only run for the specific label
    if: github.event.label.name == 'community-submission'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jsonschema numpy --quiet

      - name: Extract result JSON from issue body
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            const issueNumber = context.payload.issue.number;

            // Extract JSON from code block in issue body
            const match = body.match(/```json\n([\s\S]*?)\n```/);
            if (!match) {
              core.setFailed('No JSON code block found in issue body');
              return;
            }

            let result;
            try {
              result = JSON.parse(match[1]);
            } catch (e) {
              core.setFailed(`Invalid JSON in issue: ${e.message}`);
              return;
            }

            // Build submission directory name
            const chip = (result.chip?.name || 'unknown')
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-|-$/g, '')
              .slice(0, 30);
            const suite = result.suite_id || 'unknown';
            const scenario = result.task?.scenario || 'offline';
            const date = result.meta?.date || new Date().toISOString().split('T')[0];
            const dirName = `${chip}_${suite}_${scenario}_${date}`;

            core.setOutput('dir_name', dirName);
            core.setOutput('issue_number', issueNumber);
            core.setOutput('result_json', JSON.stringify(result));

            console.log(`Submission directory: ${dirName}`);

      - name: Write result files
        run: |
          DIR="results/community/${{ steps.extract.outputs.dir_name }}"
          mkdir -p "$DIR"

          # Write result.json
          echo '${{ steps.extract.outputs.result_json }}' | python -m json.tool > "$DIR/result.json"

          # Create placeholder files that validate_submission.py requires
          echo "Submitted via OpenClaw AccelMark Skill (Issue #${{ steps.extract.outputs.issue_number }})" > "$DIR/run.log"

          # Create minimal env_info.json from chip data in result
          python3 -c "
          import json, sys

          with open('$DIR/result.json') as f:
              result = json.load(f)

          chip = result.get('chip', {})
          software = result.get('software', {})

          env = {
              'collected_at': result.get('meta', {}).get('date', '2026-01-01') + 'T00:00:00Z',
              'accelerators': [{
                  'index': 0,
                  'name': chip.get('name', 'Unknown'),
                  'memory_gb': chip.get('memory_gb_per_chip', 0),
                  'driver_version': software.get('driver_version', 'unknown'),
                  'firmware_version': None,
              }],
              'accelerator_topology': None,
              'cpu': {
                  'model': 'unknown',
                  'physical_cores': 1,
                  'logical_cores': 1,
                  'numa_nodes': 1,
              },
              'system_memory_gb': 0,
              'pcie_generation': 'unknown',
              'cpu_accelerator_bandwidth_gbs': None,
              'network_interfaces': None,
              'kernel_version': 'unknown',
              'runtime_version': software.get('runtime_version', 'unknown'),
          }

          with open('$DIR/env_info.json', 'w') as f:
              json.dump(env, f, indent=2)

          print('env_info.json created')
          "

      - name: Run validation
        id: validate
        run: |
          DIR="results/community/${{ steps.extract.outputs.dir_name }}"
          if python runners/validate_submission.py --dir "$DIR"; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit files and create PR
        if: steps.validate.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIR="results/community/${{ steps.extract.outputs.dir_name }}"
          BRANCH="submission/${{ steps.extract.outputs.dir_name }}"
          ISSUE="${{ steps.extract.outputs.issue_number }}"

          # Configure git
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create and switch to submission branch
          git checkout -b "$BRANCH"

          # Stage the result files written in the previous step
          git add "$DIR/result.json" "$DIR/env_info.json" "$DIR/run.log"

          # Commit
          git commit -m "community: add submission from issue #${ISSUE}

          Submitted via issue #${ISSUE}.
          Directory: ${DIR}"

          # Push branch
          git push origin "$BRANCH"

          # Create PR via gh CLI
          PR_URL=$(gh pr create \
            --title "[community] ${{ steps.extract.outputs.dir_name }}" \
            --body "Auto-generated from Issue #${ISSUE}

## Submission summary

$(python3 -c "
import json
with open('$DIR/result.json') as f:
    r = json.load(f)
chip = r.get('chip', {})
model = r.get('model', {})
sw = r.get('software', {})
metrics = r.get('metrics', {})
acc = r.get('accuracy', {})
meta = r.get('meta', {})
offline = metrics.get('offline', {})
rows = offline.get('results_by_concurrency') or offline.get('results_by_batch_size') or []
valid = [x for x in rows if not x.get('oom') and x.get('throughput_tokens_per_sec')]
thr = max((x['throughput_tokens_per_sec'] for x in valid), default=None)
online = metrics.get('online', {})
iv = metrics.get('interactive', {})
print(f'| Field | Value |')
print(f'|---|---|')
print(f'| Chip | {chip.get(\"name\", \"—\")} |')
print(f'| Chip count | {chip.get(\"count\", 1)} |')
print(f'| Suite | {r.get(\"suite_id\", \"—\")} |')
print(f'| Runner | {r.get(\"implementation_id\", \"—\")} |')
print(f'| Framework | {sw.get(\"framework\", \"—\")} {sw.get(\"framework_version\", \"\")} |')
print(f'| Model | {model.get(\"model_id\", \"—\")} |')
print(f'| Precision | {model.get(\"precision\", \"—\")} |')
print(f'| Offline throughput | {round(thr) if thr else \"—\"} tok/s |')
print(f'| Online max QPS | {online.get(\"max_valid_qps\", \"—\")} |')
print(f'| Interactive TTFT p99 | {iv.get(\"ttft_ms_p99\", \"—\")} ms |')
print(f'| Accuracy valid | {acc.get(\"valid\", \"—\")} |')
print(f'| Submitted by | {meta.get(\"submitted_by\", \"—\")} |')
print(f'| Date | {meta.get(\"date\", \"—\")} |')
")

Closes #${ISSUE}" \
            --base main \
            --head "$BRANCH")

          # Comment on the issue with PR link
          gh issue comment "$ISSUE" \
            --body "✅ Validation passed! PR created: ${PR_URL}

Your result will appear on the leaderboard after the PR is reviewed and merged."

      - name: Comment failure on issue
        if: steps.validate.outputs.valid == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.extract.outputs.issue_number }}" \
            --body "❌ Validation failed. Your submission has schema errors.

See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

Common fixes:
- Make sure \`result.json\` is complete and valid JSON
- Make sure \`accuracy.valid\` is set
- Check that all required fields are present in \`result.json\`"