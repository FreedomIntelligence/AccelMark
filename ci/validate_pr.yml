name: Validate Submission

on:
  pull_request:
    paths:
      - 'results/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jsonschema numpy psutil

      - name: Find changed submission directories
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^results/' \
            | awk -F'/' '{print $1"/"$2"/"$3}' \
            | sort -u)
          echo "dirs=$CHANGED" >> $GITHUB_OUTPUT

      - name: Validate each submission
        run: |
          FAILED=0
          for DIR in ${{ steps.changed.outputs.dirs }}; do
            if [ -d "$DIR" ]; then
              echo "Validating $DIR..."
              python scripts/validate_submission.py --dir "$DIR" || FAILED=1
            fi
          done
          exit $FAILED
